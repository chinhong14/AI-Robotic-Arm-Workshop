# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    gripper_group_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    arm_group_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

gripper_group_controller:
  ros__parameters:
    joints:
      - joint_7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
arm_group_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - tcp_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity